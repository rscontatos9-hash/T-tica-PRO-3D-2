<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Tática PRO 3D | Bonequinhos Profissionais | Goleiros Fixos + Desenho Livre</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      background: linear-gradient(145deg, #1a472a 0%, #0e2a1a 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
      padding: 20px;
      overflow-x: auto;
      overflow-y: auto;
    }

    .tactical-board {
      background: #2c2c2c;
      border-radius: 2rem;
      box-shadow: 0 25px 40px rgba(0, 0, 0, 0.5), inset 0 1px 2px rgba(255,255,255,0.1);
      padding: 1rem;
      display: inline-block;
    }

    .field-wrapper {
      position: relative;
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      background-color: #146c43;
      border-radius: 24px;
      overflow: visible;
      box-shadow: inset 0 0 0 3px rgba(255,255,200,0.3), 0 10px 20px rgba(0,0,0,0.3);
      cursor: crosshair;
      aspect-ratio: 9 / 16;
    }

    @media (max-width: 550px) {
      .field-wrapper { max-width: 380px; }
    }
    @media (max-width: 450px) {
      .field-wrapper { max-width: 320px; }
    }

    .pitch-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block;
      pointer-events: none;
      z-index: 1;
    }

    .pieces-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      overflow: hidden;
      pointer-events: none;
    }

    /* ========== ESTILO PROFISSIONAL DOS BONEQUINHOS ========== */
    .player-piece {
      position: absolute;
      width: min(48px, 6.5vw);
      height: min(52px, 7vw);
      transform: translate(-50%, -50%);
      cursor: grab;
      touch-action: none;
      pointer-events: auto;
      z-index: 20;
      transition: transform 0.05s linear, filter 0.1s ease;
    }

    .player-piece:active {
      cursor: grabbing;
      transform: translate(-50%, -50%) scale(0.96);
    }

    /* Corpo do boneco (estrutura flexível) */
    .player-figure {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
    }

    /* Cabeça */
    .player-head {
      width: 60%;
      height: 40%;
      background: radial-gradient(circle at 35% 35%, #f5d0a9, #e0b586);
      border-radius: 50%;
      border: 1px solid rgba(0,0,0,0.2);
      margin-bottom: 2%;
      box-shadow: inset 0 1px 2px rgba(255,255,200,0.6), 0 1px 1px rgba(0,0,0,0.2);
    }

    /* Corpo (camisa) */
    .player-body {
      width: 80%;
      height: 48%;
      background: inherit;
      border-radius: 30% 30% 20% 20%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: clamp(0.8rem, 3.2vw, 1.1rem);
      color: white;
      text-shadow: 0 1px 1px black;
      box-shadow: inset 0 1px 3px rgba(255,255,200,0.5), 0 2px 4px rgba(0,0,0,0.3);
      position: relative;
      border: 1px solid rgba(255,255,200,0.5);
    }

    /* Número no peito */
    .player-number {
      font-weight: 800;
      font-size: inherit;
      background: rgba(0,0,0,0.3);
      padding: 0 4px;
      border-radius: 20px;
      backdrop-filter: blur(2px);
    }

    /* Cores dos times aplicadas ao body (camisa) */
    .player-piece.blue-team .player-body {
      background: radial-gradient(circle at 30% 30%, #3b82f6, #1e3a8a);
    }
    .player-piece.red-team .player-body {
      background: radial-gradient(circle at 30% 30%, #ef4444, #991b1b);
    }

    /* Destaque para goleiros (luva/coroa sutil) */
    .player-piece.goalkeeper-fixed {
      cursor: default !important;
      filter: drop-shadow(0 0 0 2px #ffcc00);
    }
    .player-piece.goalkeeper-fixed:active {
      transform: translate(-50%, -50%) scale(1);
      cursor: default;
    }
    .player-piece.goalkeeper-fixed .player-body::after {
      content: "🧤";
      position: absolute;
      font-size: 0.7rem;
      right: -8px;
      top: -8px;
      background: rgba(0,0,0,0.5);
      border-radius: 50%;
      padding: 2px;
      line-height: 1;
    }

    .player-piece.hidden-team {
      display: none;
    }

    /* Demais estilos da toolbar (inalterados) */
    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 1.2rem;
      gap: 0.8rem;
      flex-wrap: wrap;
      padding: 0 0.25rem;
    }
    .title {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(0,0,0,0.6);
      padding: 4px 12px;
      border-radius: 60px;
      backdrop-filter: blur(4px);
    }
    .title span {
      font-weight: 700;
      color: #ffdf8c;
      font-size: 0.8rem;
    }
    .title h2 {
      font-size: 1rem;
      color: white;
      font-weight: 600;
    }
    .formations-panel {
      display: flex;
      gap: 1rem;
      background: rgba(0,0,0,0.5);
      padding: 6px 12px;
      border-radius: 40px;
      backdrop-filter: blur(4px);
      flex-wrap: wrap;
      justify-content: center;
    }
    .formation-control {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #1f2937;
      padding: 4px 12px;
      border-radius: 32px;
    }
    .formation-control label {
      font-weight: bold;
      color: #ffdf8c;
      font-size: 0.8rem;
    }
    .formation-control select {
      background: #0f172a;
      color: white;
      border: 1px solid #facc15;
      border-radius: 24px;
      padding: 4px 8px;
      font-weight: bold;
      font-size: 0.75rem;
      cursor: pointer;
      font-family: monospace;
    }
    button {
      background: #1e4d2e;
      border: none;
      padding: 6px 16px;
      border-radius: 40px;
      font-weight: bold;
      font-size: 0.8rem;
      color: white;
      cursor: pointer;
      box-shadow: 0 3px 0 #0b2a18;
      transition: 0.07s linear;
      font-family: inherit;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    button:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 #0b2a18;
    }
    .info {
      background: #000000aa;
      backdrop-filter: blur(5px);
      padding: 4px 14px;
      border-radius: 50px;
      color: #ddd;
      font-size: 0.7rem;
      font-weight: 500;
      white-space: nowrap;
    }
    .draw-mode-active {
      background: #e67e22;
      box-shadow: 0 0 0 2px #ffd966;
    }
    .hide-team-select {
      background: #0f172a;
      color: white;
      border: 1px solid #facc15;
      border-radius: 24px;
      padding: 4px 12px;
      font-weight: bold;
      font-size: 0.75rem;
      cursor: pointer;
      font-family: monospace;
      margin-left: 0.2rem;
    }
    @media (max-width: 700px) {
      .formations-panel { width: 100%; justify-content: space-between; }
      .formation-control select { font-size: 0.7rem; padding: 2px 6px; }
      .info { white-space: normal; font-size: 0.6rem; }
      .title h2 { font-size: 0.85rem; }
      .player-piece {
        width: min(40px, 7vw);
        height: min(44px, 7.8vw);
      }
      button { padding: 4px 12px; font-size: 0.7rem; }
      .hide-team-select { font-size: 0.7rem; padding: 2px 8px; }
    }
  </style>
</head>
<body>
<div class="tactical-board">
  <div class="field-wrapper" id="fieldWrapper">
    <canvas id="pitchCanvas" class="pitch-canvas"></canvas>
    <div id="piecesContainer" class="pieces-container"></div>
  </div>
  <div class="toolbar">
    <div class="title">
      <span>⚽</span>
      <h2>TÁTICA PRO 3D</h2>
      <span>🧑‍🏫</span>
    </div>
    <div class="formations-panel">
      <div class="formation-control" style="background:#1e3a8a;">
        <label style="color:#bfdbfe;">🔵 A</label>
        <select id="blueFormationSelect">
          <option value="442">4-4-2 (Clássico)</option>
          <option value="433">4-3-3 (Ofensivo)</option>
          <option value="4231">4-2-3-1 (Moderna)</option>
          <option value="352">3-5-2 (Ataque)</option>
          <option value="532">5-3-2 (Defensivo)</option>
          <option value="4141">4-1-4-1</option>
          <option value="343">3-4-3</option>
          <option value="4222">4-2-2-2</option>
          <option value="3241">3-2-4-1</option>
          <option value="235">2-3-5</option>
        </select>
      </div>
      <div class="formation-control" style="background:#991b1b;">
        <label style="color:#fecaca;">🔴 B</label>
        <select id="redFormationSelect">
          <option value="442">4-4-2 (Clássico)</option>
          <option value="433">4-3-3 (Ofensivo)</option>
          <option value="4231">4-2-3-1 (Moderna)</option>
          <option value="352">3-5-2 (Ataque)</option>
          <option value="532">5-3-2 (Defensivo)</option>
          <option value="4141">4-1-4-1</option>
          <option value="343">3-4-3</option>
          <option value="4222">4-2-2-2</option>
          <option value="3241">3-2-4-1</option>
          <option value="235">2-3-5</option>
        </select>
      </div>
    </div>
    <button id="resetBtn">⟳ RESETAR POSIÇÕES</button>
    <div style="display: flex; align-items: center; gap: 8px; background: #1f2937; padding: 4px 12px; border-radius: 32px;">
      <label style="font-weight: bold; color: #ffdf8c; font-size: 0.8rem;">🙈 OCULTAR TIME</label>
      <select id="hideTeamSelect" class="hide-team-select">
        <option value="none">Nenhum</option>
        <option value="blue">Time Azul</option>
        <option value="red">Time Vermelho</option>
      </select>
    </div>
    <button id="drawBtn">✏️ DESENHAR</button>
    <button id="clearDrawBtn">🗑️ LIMPAR DESENHO</button>
    <div class="info">
      🧤 Goleiros fixos | 🖱️ Arraste jogadores | ✨ Clique em "DESENHAR" e arraste no campo
    </div>
  </div>
</div>

<script>
  // ======================= DADOS DOS TIMES =======================
  const GOALIE_POS = {
    blue: { left: 50, top: 97.25 },
    red:  { left: 50, top: 2.75 }
  };

  const formacoes = {
    442: { blue: [ [20,70],[40,68],[60,68],[80,70],[22,48],[45,45],[55,45],[78,48],[35,28],[65,28] ], red: [ [20,30],[40,32],[60,32],[80,30],[22,52],[45,55],[55,55],[78,52],[35,72],[65,72] ] },
    433: { blue: [ [18,70],[38,66],[62,66],[82,70],[35,50],[50,48],[65,50],[25,28],[50,22],[75,28] ], red: [ [18,30],[38,34],[62,34],[82,30],[35,50],[50,52],[65,50],[25,72],[50,78],[75,72] ] },
    4231: { blue: [ [18,70],[38,68],[62,68],[82,70],[40,54],[60,54],[25,40],[50,38],[75,40],[50,22] ], red: [ [18,30],[38,32],[62,32],[82,30],[40,46],[60,46],[25,60],[50,62],[75,60],[50,78] ] },
    352: { blue: [ [28,68],[50,65],[72,68],[18,50],[38,48],[50,45],[62,48],[82,50],[35,28],[65,28] ], red: [ [28,32],[50,35],[72,32],[18,50],[38,52],[50,55],[62,52],[82,50],[35,72],[65,72] ] },
    532: { blue: [ [15,72],[32,70],[50,68],[68,70],[85,72],[38,50],[50,48],[62,50],[35,30],[65,30] ], red: [ [15,28],[32,30],[50,32],[68,30],[85,28],[38,50],[50,52],[62,50],[35,70],[65,70] ] },
    4141: { blue: [ [18,68],[38,66],[62,66],[82,68],[50,54],[22,40],[42,38],[58,38],[78,40],[50,22] ], red: [ [18,32],[38,34],[62,34],[82,32],[50,46],[22,60],[42,62],[58,62],[78,60],[50,78] ] },
    343: { blue: [ [25,68],[50,66],[75,68],[18,48],[40,45],[60,45],[82,48],[30,28],[50,24],[70,28] ], red: [ [25,32],[50,34],[75,32],[18,52],[40,55],[60,55],[82,52],[30,72],[50,76],[70,72] ] },
    4222: { blue: [ [18,70],[38,68],[62,68],[82,70],[38,54],[62,54],[28,40],[72,40],[42,25],[58,25] ], red: [ [18,30],[38,32],[62,32],[82,30],[38,46],[62,46],[28,60],[72,60],[42,75],[58,75] ] },
    3241: { blue: [ [25,68],[50,66],[75,68],[38,56],[62,56],[18,44],[38,42],[62,42],[82,44],[50,24] ], red: [ [25,32],[50,34],[75,32],[38,44],[62,44],[18,56],[38,58],[62,58],[82,56],[50,76] ] },
    235: { blue: [ [35,70],[65,70],[38,56],[50,54],[62,56],[15,34],[35,30],[50,26],[65,30],[85,34] ], red: [ [35,30],[65,30],[38,44],[50,46],[62,44],[15,66],[35,70],[50,74],[65,70],[85,66] ] }
  };

  // ========== ESTADO GLOBAL ==========
  let piecesState = [];
  let container = document.getElementById('piecesContainer');
  let fieldWrapper = document.getElementById('fieldWrapper');
  let canvas = document.getElementById('pitchCanvas');
  let ctx = canvas.getContext('2d');

  let activeDrag = false;
  let currentPiece = null;
  let currentBlueFormation = '442';
  let currentRedFormation = '442';

  let drawings = [];
  let drawMode = false;
  let isDrawing = false;
  let currentStroke = null;
  const DRAW_COLOR = '#FFD966';
  const DRAW_WIDTH = 4;

  const drawBtn = document.getElementById('drawBtn');
  const clearDrawBtn = document.getElementById('clearDrawBtn');
  const hideTeamSelect = document.getElementById('hideTeamSelect');

  function applyTeamVisibility() {
    const selected = hideTeamSelect.value;
    piecesState.forEach(piece => {
      piece.element.classList.remove('hidden-team');
    });
    if (selected === 'blue') {
      piecesState.filter(p => p.team === 'blue').forEach(p => p.element.classList.add('hidden-team'));
    } else if (selected === 'red') {
      piecesState.filter(p => p.team === 'red').forEach(p => p.element.classList.add('hidden-team'));
    }
  }

  // ========== DESENHO DO CAMPO (com borda externa completa) ==========
  function drawPitch() {
    if (!fieldWrapper || !canvas) return;
    const rect = fieldWrapper.getBoundingClientRect();
    let width = rect.width;
    let height = rect.height;
    if (width === 0 || height === 0) return;
    
    canvas.width = width;
    canvas.height = height;
    
    const grad = ctx.createLinearGradient(0, 0, width * 0.3, height);
    grad.addColorStop(0, '#1d7944');
    grad.addColorStop(1, '#14633a');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, width, height);
    
    ctx.save();
    ctx.strokeStyle = '#ffffffdd';
    ctx.fillStyle = '#ffffffcc';
    ctx.lineWidth = Math.max(2, width / 160);
    ctx.shadowBlur = 0;
    
    // BORDA EXTERNA COMPLETA (todas as 4 laterais)
    ctx.strokeRect(0, 0, width, height);
    
    // Linha do meio
    ctx.beginPath();
    ctx.moveTo(0, height/2);
    ctx.lineTo(width, height/2);
    ctx.stroke();
    
    // Círculo central
    let centerRadius = Math.min(width, height) * 0.10;
    centerRadius = Math.min(centerRadius, width * 0.28);
    ctx.beginPath();
    ctx.arc(width/2, height/2, centerRadius, 0, 2 * Math.PI);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(width/2, height/2, Math.max(3, width/100), 0, 2 * Math.PI);
    ctx.fill();
    
    // Grandes áreas
    const areaWidth = width * 0.44;
    const areaHeight = height * 0.12;
    ctx.strokeRect((width - areaWidth)/2, 0, areaWidth, areaHeight);
    ctx.strokeRect((width - areaWidth)/2, height - areaHeight, areaWidth, areaHeight);
    
    // Pequenas áreas
    const smallAreaW = width * 0.26;
    const smallAreaH = height * 0.055;
    ctx.strokeRect((width - smallAreaW)/2, 0, smallAreaW, smallAreaH);
    ctx.strokeRect((width - smallAreaW)/2, height - smallAreaH, smallAreaW, smallAreaH);
    
    // Marcas de pênalti
    const penaltySpotSize = Math.max(4, width/80);
    const penaltyTopY = areaHeight * 0.75;
    const penaltyBottomY = height - areaHeight * 0.75;
    ctx.beginPath();
    ctx.arc(width/2, penaltyTopY, penaltySpotSize, 0, 2*Math.PI);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(width/2, penaltyBottomY, penaltySpotSize, 0, 2*Math.PI);
    ctx.fill();
    
    // Arcos de escanteio
    ctx.strokeStyle = '#fffaec';
    ctx.lineWidth = Math.max(1.5, width/320);
    const cornerRadius = width * 0.06;
    ctx.beginPath();
    ctx.arc(0, 0, cornerRadius, 0, Math.PI/2);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(width, 0, cornerRadius, Math.PI/2, Math.PI);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(0, height, cornerRadius, -Math.PI/2, 0);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(width, height, cornerRadius, Math.PI, 3*Math.PI/2);
    ctx.stroke();
    
    ctx.restore();
    drawAllDrawings();
  }

  function drawAllDrawings() {
    if (!canvas || drawings.length === 0) return;
    const rect = fieldWrapper.getBoundingClientRect();
    const width = rect.width;
    const height = rect.height;
    if (width === 0) return;
    for (const stroke of drawings) {
      if (stroke.points.length < 2) continue;
      ctx.save();
      ctx.beginPath();
      ctx.strokeStyle = stroke.color;
      ctx.lineWidth = stroke.lineWidth;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      const first = stroke.points[0];
      ctx.moveTo((first.x / 100) * width, (first.y / 100) * height);
      for (let i = 1; i < stroke.points.length; i++) {
        const p = stroke.points[i];
        ctx.lineTo((p.x / 100) * width, (p.y / 100) * height);
      }
      ctx.stroke();
      ctx.restore();
    }
  }

  function addStroke(points) {
    if (points.length < 2) return;
    drawings.push({ points: [...points], color: DRAW_COLOR, lineWidth: DRAW_WIDTH });
    drawPitch();
  }

  function clearAllDrawings() {
    drawings = [];
    drawPitch();
    const infoDiv = document.querySelector('.info');
    if (infoDiv) {
      const original = infoDiv.innerHTML;
      infoDiv.innerHTML = '🧽 Todos os desenhos foram apagados!';
      setTimeout(() => { if (infoDiv) infoDiv.innerHTML = original; }, 1500);
    }
  }

  // ========== MODO DESENHO ==========
  function activateDrawMode() {
    drawMode = true;
    drawBtn.classList.add('draw-mode-active');
    fieldWrapper.style.cursor = 'crosshair';
    const infoDiv = document.querySelector('.info');
    if (infoDiv) infoDiv.innerHTML = '✏️ MODO DESENHO ATIVO: Clique e arraste no campo.';
  }
  function deactivateDrawMode() {
    drawMode = false;
    drawBtn.classList.remove('draw-mode-active');
    fieldWrapper.style.cursor = 'crosshair';
    const infoDiv = document.querySelector('.info');
    if (infoDiv) infoDiv.innerHTML = '🧤 Goleiros fixos | 🖱️ Arraste jogadores | ✨ Clique em "DESENHAR" e arraste no campo';
  }
  function toggleDrawMode() { drawMode ? deactivateDrawMode() : activateDrawMode(); }

  function getCanvasCoords(e) {
    const rect = fieldWrapper.getBoundingClientRect();
    let cx, cy;
    if (e.touches) { cx = e.touches[0].clientX; cy = e.touches[0].clientY; }
    else { cx = e.clientX; cy = e.clientY; }
    let x = ((cx - rect.left) / rect.width) * 100;
    let y = ((cy - rect.top) / rect.height) * 100;
    return { x: Math.min(100, Math.max(0, x)), y: Math.min(100, Math.max(0, y)) };
  }

  function startDrawing(e) {
    if (!drawMode) return;
    if (e.target.closest && e.target.closest('.player-piece')) return;
    e.preventDefault();
    isDrawing = true;
    const { x, y } = getCanvasCoords(e);
    currentStroke = [{ x, y }];
    drawPreviewDot(x, y);
  }
  function drawDrawing(e) {
    if (!drawMode || !isDrawing || !currentStroke) return;
    e.preventDefault();
    const { x, y } = getCanvasCoords(e);
    const last = currentStroke[currentStroke.length-1];
    if (Math.hypot(last.x - x, last.y - y) < 0.5) return;
    currentStroke.push({ x, y });
    drawPitch();
    drawTemporaryStroke(currentStroke);
  }
  function endDrawing(e) {
    if (!drawMode || !isDrawing) { isDrawing = false; currentStroke = null; return; }
    e.preventDefault();
    if (currentStroke && currentStroke.length >= 2) addStroke(currentStroke);
    isDrawing = false;
    currentStroke = null;
  }
  function drawTemporaryStroke(points) {
    if (!canvas || points.length < 2) return;
    const rect = fieldWrapper.getBoundingClientRect();
    const w = rect.width, h = rect.height;
    if (w === 0) return;
    ctx.save();
    ctx.beginPath();
    ctx.strokeStyle = DRAW_COLOR;
    ctx.lineWidth = DRAW_WIDTH;
    ctx.lineCap = 'round';
    const first = points[0];
    ctx.moveTo((first.x/100)*w, (first.y/100)*h);
    for (let i=1; i<points.length; i++) ctx.lineTo((points[i].x/100)*w, (points[i].y/100)*h);
    ctx.stroke();
    ctx.restore();
  }
  function drawPreviewDot(x,y) {
    if (!canvas) return;
    const rect = fieldWrapper.getBoundingClientRect();
    const w = rect.width, h = rect.height;
    if (w===0) return;
    ctx.save();
    ctx.beginPath();
    ctx.arc((x/100)*w, (y/100)*h, DRAW_WIDTH*0.8, 0, 2*Math.PI);
    ctx.fillStyle = DRAW_COLOR;
    ctx.fill();
    ctx.restore();
  }

  // ========== FUNÇÕES DE FORMAÇÕES E RESET ==========
  function handleResize() {
    drawPitch();
    piecesState.forEach(p => { if(p.element) p.element.style.left = p.leftPct+'%'; p.element.style.top = p.topPct+'%'; });
  }
  function applyFormation(team, key) {
    const pos = formacoes[key]?.[team];
    if (!pos) return;
    const players = piecesState.filter(p => p.team === team && p.number !== 1).sort((a,b)=>a.number-b.number);
    for (let i=0; i<players.length && i<pos.length; i++) {
      players[i].leftPct = pos[i][0];
      players[i].topPct = pos[i][1];
      players[i].element.style.left = players[i].leftPct + '%';
      players[i].element.style.top = players[i].topPct + '%';
    }
  }
  function fixGoalies() {
    piecesState.forEach(p => {
      if (p.number===1 && p.team==='blue') { p.leftPct=GOALIE_POS.blue.left; p.topPct=GOALIE_POS.blue.top; p.element.style.left=p.leftPct+'%'; p.element.style.top=p.topPct+'%'; }
      if (p.number===1 && p.team==='red') { p.leftPct=GOALIE_POS.red.left; p.topPct=GOALIE_POS.red.top; p.element.style.left=p.leftPct+'%'; p.element.style.top=p.topPct+'%'; }
    });
  }
  function onBlueChange(e) { currentBlueFormation = e.target.value; applyFormation('blue', currentBlueFormation); fixGoalies(); drawPitch(); }
  function onRedChange(e) { currentRedFormation = e.target.value; applyFormation('red', currentRedFormation); fixGoalies(); drawPitch(); }
  function resetPositions() {
    applyFormation('blue', currentBlueFormation);
    applyFormation('red', currentRedFormation);
    fixGoalies();
    clearAllDrawings();
    hideTeamSelect.value = 'none';
    applyTeamVisibility();
    drawPitch();
  }

  // ========== CRIAÇÃO DAS PEÇAS COM BONEQUINHOS ==========
  function createPieces() {
    container.innerHTML = '';
    piecesState = [];
    function addPiece(team, number) {
      const isG = number === 1;
      const div = document.createElement('div');
      div.className = `player-piece ${team}-team${isG ? ' goalkeeper-fixed' : ''}`;
      div.setAttribute('data-team', team);
      div.setAttribute('data-number', number);
      div.setAttribute('data-goalie', isG);
      
      // Estrutura do boneco
      const figure = document.createElement('div');
      figure.className = 'player-figure';
      const head = document.createElement('div');
      head.className = 'player-head';
      const body = document.createElement('div');
      body.className = 'player-body';
      const numberSpan = document.createElement('span');
      numberSpan.className = 'player-number';
      numberSpan.textContent = number;
      body.appendChild(numberSpan);
      figure.appendChild(head);
      figure.appendChild(body);
      div.appendChild(figure);
      
      div.style.left = '50%';
      div.style.top = '50%';
      if (!isG) {
        div.addEventListener('mousedown', onDragStart);
        div.addEventListener('touchstart', onDragStart, { passive: false });
      } else div.style.cursor = 'default';
      container.appendChild(div);
      return { id:`${team}-${number}`, team, number, leftPct:50, topPct:50, element:div, isGoalie:isG };
    }
    for (let i=1;i<=11;i++) { piecesState.push(addPiece('blue',i)); piecesState.push(addPiece('red',i)); }
    applyFormation('blue', currentBlueFormation);
    applyFormation('red', currentRedFormation);
    fixGoalies();
    applyTeamVisibility();
  }

  // ========== ARRASTO (inalterado) ==========
  function onDragStart(e) {
    if (activeDrag) return;
    e.preventDefault(); e.stopPropagation();
    let cx, cy;
    if (e.type==='mousedown') { cx=e.clientX; cy=e.clientY; }
    else { cx=e.touches[0].clientX; cy=e.touches[0].clientY; }
    const target = e.currentTarget;
    if (target.getAttribute('data-goalie') === 'true') return;
    const pieceId = target.getAttribute('data-team')+'-'+target.getAttribute('data-number');
    const piece = piecesState.find(p=>p.id===pieceId);
    if (!piece || piece.isGoalie) return;
    currentPiece = piece;
    const rect = target.getBoundingClientRect();
    const centerX = rect.left + rect.width/2;
    const centerY = rect.top + rect.height/2;
    currentPiece._dragOffsetX = cx - centerX;
    currentPiece._dragOffsetY = cy - centerY;
    activeDrag = true;
    target.style.zIndex = '999';
    target.style.cursor = 'grabbing';
    window.addEventListener('mousemove', onDragMove);
    window.addEventListener('mouseup', onDragEnd);
    window.addEventListener('touchmove', onDragMove, { passive: false });
    window.addEventListener('touchend', onDragEnd);
    window.addEventListener('touchcancel', onDragEnd);
  }
  function onDragMove(e) {
    if (!activeDrag || !currentPiece) return;
    e.preventDefault();
    let cx, cy;
    if (e.type==='mousemove') { cx=e.clientX; cy=e.clientY; }
    else if (e.type==='touchmove') { cx=e.touches[0].clientX; cy=e.touches[0].clientY; }
    else return;
    const rect = container.getBoundingClientRect();
    const elem = currentPiece.element;
    const pw = elem.offsetWidth, ph = elem.offsetHeight;
    if (rect.width===0) return;
    let desiredX = cx - currentPiece._dragOffsetX;
    let desiredY = cy - currentPiece._dragOffsetY;
    let clampedX = Math.min(rect.right - pw, Math.max(rect.left, desiredX));
    let clampedY = Math.min(rect.bottom - ph, Math.max(rect.top, desiredY));
    let leftPct = ((clampedX - rect.left) / rect.width) * 100;
    let topPct = ((clampedY - rect.top) / rect.height) * 100;
    currentPiece.leftPct = Math.min(100, Math.max(0, leftPct));
    currentPiece.topPct = Math.min(100, Math.max(0, topPct));
    elem.style.left = currentPiece.leftPct + '%';
    elem.style.top = currentPiece.topPct + '%';
  }
  function onDragEnd(e) {
    if (!activeDrag) return;
    e.preventDefault();
    if (currentPiece) {
      currentPiece.element.style.zIndex = '';
      currentPiece.element.style.cursor = '';
      delete currentPiece._dragOffsetX;
      delete currentPiece._dragOffsetY;
      currentPiece = null;
    }
    activeDrag = false;
    window.removeEventListener('mousemove', onDragMove);
    window.removeEventListener('mouseup', onDragEnd);
    window.removeEventListener('touchmove', onDragMove);
    window.removeEventListener('touchend', onDragEnd);
    window.removeEventListener('touchcancel', onDragEnd);
  }

  // ========== INICIALIZAÇÃO ==========
  function init() {
    createPieces();
    drawPitch();
    window.addEventListener('resize', handleResize);
    if (window.ResizeObserver) new ResizeObserver(handleResize).observe(fieldWrapper);
    window.addEventListener('load', handleResize);
    document.getElementById('blueFormationSelect').addEventListener('change', onBlueChange);
    document.getElementById('redFormationSelect').addEventListener('change', onRedChange);
    document.getElementById('resetBtn').addEventListener('click', resetPositions);
    drawBtn.addEventListener('click', toggleDrawMode);
    clearDrawBtn.addEventListener('click', clearAllDrawings);
    hideTeamSelect.addEventListener('change', applyTeamVisibility);
    fieldWrapper.addEventListener('mousedown', startDrawing);
    fieldWrapper.addEventListener('mousemove', drawDrawing);
    fieldWrapper.addEventListener('mouseup', endDrawing);
    fieldWrapper.addEventListener('touchstart', startDrawing, { passive: false });
    fieldWrapper.addEventListener('touchmove', drawDrawing, { passive: false });
    fieldWrapper.addEventListener('touchend', endDrawing);
    fieldWrapper.addEventListener('touchcancel', endDrawing);
    document.body.style.touchAction = 'pan-y pan-x';
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
  else init();
</script>
</body>
</html>
